name: Publish Common Library to GitHub Packages

on:
  push:
    branches:
      - main  # Automatically publishes a new version whenever you push or merge to main

jobs:
  publish-jar:
    runs-on: ubuntu-latest

    # We must grant the script explicit write access to your GitHub Packages registry
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Download the common library source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java 21 with Maven dependency caching
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Compile, package, and deploy the JAR directly to GitHub Packages
      # 'deploy' tells Maven to upload the package using the URL we set up in Step 1
      - name: Publish to GitHub Packages
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically generated by GitHub, no setup required!