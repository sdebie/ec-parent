name: Publish Parent Library to GitHub Packages

on:
  push:
    branches:
      - main

# Opt into Node 24 globally for all actions in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-jar:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Download the parent library source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java 21 with Maven dependency caching
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # 3. Publish the parent POM to GitHub Packages
      - name: Publish to GitHub Packages
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}